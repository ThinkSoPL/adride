  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

8 0.025 250);\n  --ink-2:        oklch(0.26 0.025 250);\n  --ink-3:        oklch(0.42 0.020 250);\n\n  /* Paper (warm off-white) */\n  --paper:        oklch(0.985 0.006 80);\n  --paper-2:      oklch(0.965 0.008 80);\n  --paper-3:      oklch(0.935 0.010 80);\n  --line:         oklch(0.90 0.010 80);\n  --line-2:       oklch(0.84 0.010 80);\n\n  /* Functional */\n  --live:         oklch(0.74 0.17 145);   /* GPS live indicator */\n  --live-soft:    oklch(0.92 0.10 145);\n  --danger:       oklch(0.62 0.21 25);\n  --info:         oklch(0.65 0.13 240);\n\n  /* Text */\n  --text:         var(--ink);\n  --text-muted:   var(--ink-3);\n  --text-on-amber: oklch(0.18 0.025 250);\n\n  /* Typography */\n  --font-display: 'Space Grotesk', system-ui, sans-serif;\n  --font-body:    'Geist', system-ui, sans-serif;\n  --font-mono:    'Geist Mono', ui-monospace, monospace;\n\n  /* Radii */\n  --r-xs: 6px;\n  --r-sm: 10px;\n  --r-md: 14px;\n  --r-lg: 20px;\n  --r-xl: 28px;\n  --r-pill: 999px;\n\n  /* Shadow */\n  --shadow-sm: 0 1px 2px rgba(15, 20, 38, .06), 0 1px 1px rgba(15, 20, 38, .04);\n  --shadow-md: 0 6px 18px rgba(15, 20, 38, .08), 0 2px 4px rgba(15, 20, 38, .04);\n  --shadow-lg: 0 24px 60px rgba(15, 20, 38, .12), 0 4px 8px rgba(15, 20, 38, .04);\n  --shadow-amber: 0 8px 24px oklch(0.78 0.18 65 / 0.35);\n}\n\n* { box-sizing: border-box; }\n\nhtml, body {\n  margin: 0;\n  padding: 0;\n  font-family: var(--font-body);\n  color: var(--text);\n  background: var(--paper);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* Wordmark — utility class */\n.wordmark {\n  font-family: var(--font-display);\n  font-weight: 700;\n  letter-spacing: -0.02em;\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n}\n.wordmark .dot {\n  width: 10px; height: 10px;\n  border-radius: 50%;\n  background: var(--amber);\n  box-shadow: 0 0 0 4px oklch(0.78 0.18 65 / 0.18);\n  display: inline-block;\n}\n\n/* Live pill */\n.live-pill {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  font-weight: 500;\n  letter-spacing: 0.04em;\n  text-transform: uppercase;\n  padding: 4px 10px 4px 8px;\n  border-radius: var(--r-pill);\n  background: var(--live-soft);\n  color: oklch(0.32 0.12 145);\n}\n.live-pill::before {\n  content: '';\n  width: 6px; height: 6px;\n  border-radius: 50%;\n  background: var(--live);\n  box-shadow: 0 0 0 0 oklch(0.74 0.17 145 / 0.6);\n  animation: live-pulse 1.6s ease-out infinite;\n}\n@keyframes live-pulse {\n  0%   { box-shadow: 0 0 0 0 oklch(0.74 0.17 145 / 0.7); }\n  70%  { box-shadow: 0 0 0 8px oklch(0.74 0.17 145 / 0); }\n  100% { box-shadow: 0 0 0 0 oklch(0.74 0.17 145 / 0); }\n}\n\n/* Buttons */\n.btn {\n  font-family: var(--font-body);\n  font-weight: 500;\n  font-size: 15px;\n  padding: 12px 20px;\n  border-radius: var(--r-md);\n  border: none;\n  cursor: pointer;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 8px;\n  transition: transform .15s ease, box-shadow .15s ease, background .15s ease;\n}\n.btn-primary {\n  background: var(--ink);\n  color: var(--paper);\n}\n.btn-primary:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }\n.btn-amber {\n  background: var(--amber);\n  color: var(--text-on-amber);\n  font-weight: 600;\n}\n.btn-amber:hover { transform: translateY(-1px); box-shadow: var(--shadow-amber); }\n.btn-ghost {\n  background: transparent;\n  color: var(--text);\n  border: 1px solid var(--line-2);\n}\n.btn-ghost:hover { background: var(--paper-2); }\n\n/* Cards */\n.card {\n  background: var(--paper);\n  border: 1px solid var(--line);\n  border-radius: var(--r-lg);\n  padding: 24px;\n}\n\n/* Tag */\n.tag {\n  display: inline-flex;\n  align-items: center;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  font-weight: 500;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  padding: 4px 10px;\n  border-radius: var(--r-pill);\n  background: var(--paper-3);\n  color: var(--ink-2);\n}\n.tag.amber { background: var(--amber-soft); color: oklch(0.42 0.16 55); }\n.tag.ink   { background: var(--ink); color: var(--paper); }\n.tag.live  { background: var(--live-soft); color: oklch(0.32 0.12 145); }\n\n/* Utility: striped placeholder */\n.placeholder {\n  background: repeating-linear-gradient(135deg,\n    var(--paper-2) 0 10px,\n    var(--paper-3) 10px 20px);\n  color: var(--ink-3);\n  font-family: var(--font-mono);\n  font-size: 12px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  border-radius: var(--r-md);\n  border: 1px dashed var(--line-2);\n}\n\n/* Mono numeric */\n.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }\n.display { font-family: var(--font-display); letter-spacing: -0.02em; }\n<\u002Fstyle>\n\n<style>\n  body { background: var(--paper); overflow-x: hidden; }\n\n  /* ---------- NAV ---------- */\n  .nav {\n    position: sticky; top: 0; z-index: 50;\n    background: oklch(0.985 0.006 80 / 0.85);\n    backdrop-filter: blur(12px);\n    border-bottom: 1px solid var(--line);\n  }\n  .nav-inner {\n    max-width: 1280px; margin: 0 auto;\n    padding: 18px 32px;\n    display: flex; align-items: center; justify-content: space-between;\n  }\n  .nav .wordmark { font-size: 22px; }\n  .nav-links { display: flex; gap: 28px; align-items: center; }\n  .nav-links a {\n    color: var(--ink-2); text-decoration: none;\n    font-size: 14px; font-weight: 500;\n  }\n  .nav-links a:hover { color: var(--ink); }\n  .nav-cta { display: flex; gap: 10px; align-items: center; }\n  .lang-toggle {\n    display: inline-flex; border: 1px solid var(--line-2); border-radius: var(--r-pill);\n    padding: 3px; font-family: var(--font-mono); font-size: 11px;\n  }\n  .lang-toggle button {\n    border: none; background: transparent; padding: 4px 10px;\n    border-radius: var(--r-pill); cursor: pointer; color: var(--ink-3); font-family: inherit;\n  }\n  .lang-toggle button.active { background: var(--ink); color: var(--paper); }\n\n  /* ---------- HERO ---------- */\n  .hero {\n    max-width: 1280px; margin: 0 auto;\n    padding: 80px 32px 60px;\n    display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 60px;\n    align-items: center;\n  }\n  .hero-eyebrow {\n    display: inline-flex; align-items: center; gap: 8px;\n    font-family: var(--font-mono); font-size: 12px; font-weight: 500;\n    color: var(--ink-3); letter-spacing: 0.06em; text-transform: uppercase;\n    margin-bottom: 24px;\n  }\n  .hero-eyebrow::before {\n    content: ''; width: 24px; height: 1px; background: var(--ink-3);\n  }\n  .hero h1 {\n    font-family: var(--font-display);\n    font-size: clamp(48px, 6vw, 76px);\n    line-height: 1.02;\n    letter-spacing: -0.03em;\n    font-weight: 600;\n    margin: 0 0 24px;\n    color: var(--ink);\n  }\n  .hero h1 .accent {\n    background: linear-gradient(180deg, transparent 65%, var(--amber-glow) 65%);\n    padding: 0 4px;\n  }\n  .hero h1 em {\n    font-style: normal;\n    font-family: 'Space Grotesk', serif;\n    color: var(--amber-deep);\n  }\n  .hero p.lede {\n    font-size: 19px; line-height: 1.55; color: var(--ink-2);\n    max-width: 540px; margin: 0 0 36px;\n  }\n  .hero-ctas { display: flex; gap: 12px; flex-wrap: wrap; }\n  .hero-ctas .btn { padding: 16px 24px; font-size: 16px; }\n\n  .hero-meta {\n    margin-top: 40px;\n    display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px;\n    max-width: 540px;\n  }\n  .hero-meta .stat-num {\n    font-family: var(--font-display); font-size: 32px; font-weight: 600;\n    letter-spacing: -0.02em; color: var(--ink);\n  }\n  .hero-meta .stat-label {\n    font-size: 12px; color: var(--ink-3); margin-top: 4px;\n    font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.05em;\n  }\n\n  /* Hero visual: stylized car-with-ad on city map */\n  .hero-visual {\n    position: relative;\n    aspect-ratio: 1 / 1.05;\n    border-radius: var(--r-xl);\n    overflow: hidden;\n    background: linear-gradient(135deg, oklch(0.96 0.02 70) 0%, oklch(0.92 0.04 60) 100%);\n    border: 1px solid var(--line);\n  }\n  .hero-map {\n    position: absolute; inset: 0;\n    background-image:\n      radial-gradient(circle at 30% 40%, oklch(0.78 0.18 65 / 0.18) 0%, transparent 30%),\n      radial-gradient(circle at 70% 60%, oklch(0.78 0.18 65 / 0.12) 0%, transparent 25%),\n      radial-gradient(circle at 50% 80%, oklch(0.78 0.18 65 / 0.08) 0%, transparent 20%);\n  }\n  .hero-grid {\n    position: absolute; inset: 0;\n    background-image:\n      linear-gradient(oklch(0.18 0.025 250 / 0.04) 1px, transparent 1px),\n      linear-gradient(90deg, oklch(0.18 0.025 250 / 0.04) 1px, transparent 1px);\n    background-size: 32px 32px;\n  }\n  /* Roads */\n  .hero-road {\n    position: absolute;\n    background: var(--ink);\n    opacity: 0.85;\n    border-radius: 2px;\n  }\n  .road-h1 { left: -5%; right: -5%; top: 38%; height: 5px; transform: rotate(-2deg); }\n  .road-h2 { left: -5%; right: -5%; top: 68%; height: 7px; transform: rotate(1.5deg); }\n  .road-v1 { top: -5%; bottom: -5%; left: 28%; width: 4px; }\n  .road-v2 { top: -5%; bottom: -5%; left: 72%; width: 6px; transform: rotate(-3deg); }\n\n  /* Trip trace */\n  .trace {\n    position: absolute; inset: 0;\n    z-index: 2;\n  }\n  .car-dot {\n    position: absolute; top: 38%; left: 60%;\n    width: 18px; height: 18px;\n    background: var(--amber);\n    border-radius: 50%;\n    border: 3px solid var(--paper);\n    box-shadow: 0 0 0 0 oklch(0.78 0.18 65 / 0.7), var(--shadow-md);\n    animation: live-pulse 1.6s ease-out infinite;\n    z-index: 3;\n  }\n  .city-marker {\n    position: absolute;\n    width: 8px; height: 8px;\n    border-radius: 50%;\n    background: var(--ink);\n    z-index: 3;\n  }\n  .city-marker::after {\n    content: attr(data-label);\n    position: absolute; left: 14px; top: -4px;\n    font-family: var(--font-mono); font-size: 10px;\n    color: var(--ink); white-space: nowrap;\n    font-weight: 500;\n  }\n\n  .hero-card {\n    position: absolute; z-index: 4;\n    background: var(--paper);\n    border-radius: var(--r-md);\n    padding: 14px 16px;\n    box-shadow: var(--shadow-lg);\n    border: 1px solid var(--line);\n    min-width: 160px;\n  }\n  .hero-card.tl { top: 28px; left: 28px; }\n  .hero-card.br { bottom: 28px; right: 28px; }\n  .hero-card .hc-label {\n    font-family: var(--font-mono); font-size: 10px;\n    color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.05em;\n  }\n  .hero-card .hc-value {\n    font-family: var(--font-display); font-size: 22px; font-weight: 600;\n    color: var(--ink); margin-top: 4px; letter-spacing: -0.01em;\n  }\n  .hero-card .hc-sub {\n    font-family: var(--font-mono); font-size: 11px;\n    color: var(--live);\n    margin-top: 2px;\n  }\n\n  /* Ad-car svg illo */\n  .ad-car {\n    position: absolute; top: 50%; left: 50%;\n    transform: translate(-50%, -50%) rotate(8deg);\n    width: 240px;\n    z-index: 5;\n    filter: drop-shadow(0 14px 24px rgba(15,20,38,0.18));\n  }\n\n  /* ---------- TICKER ---------- */\n  .ticker {\n    background: var(--ink);\n    color: var(--paper);\n    padding: 18px 0;\n    overflow: hidden;\n    border-top: 1px solid var(--ink-2);\n    border-bottom: 1px solid var(--ink-2);\n  }\n  .ticker-track {\n    display: flex; gap: 56px; white-space: nowrap;\n    animation: ticker 36s linear infinite;\n    font-family: var(--font-display); font-weight: 500; font-size: 18px;\n    letter-spacing: -0.01em;\n  }\n  .ticker-track span { display: inline-flex; align-items: center; gap: 16px; }\n  .ticker-track .sep { color: var(--amber); font-size: 22px; }\n  @keyframes ticker {\n    to { transform: translateX(-50%); }\n  }\n\n  /* ---------- SECTIONS ---------- */\n  section.surface {\n    max-width: 1280px; margin: 0 auto;\n    padding: 100px 32px;\n  }\n  .sec-eyebrow {\n    font-family: var(--font-mono); font-size: 12px;\n    text-transform: uppercase; letter-spacing: 0.08em;\n    color: var(--ink-3); margin-bottom: 16px;\n  }\n  .sec-title {\n    font-family: var(--font-display); font-size: 48px;\n    line-height: 1.05; letter-spacing: -0.025em;\n    font-weight: 600; margin: 0 0 20px; max-width: 760px;\n  }\n  .sec-lede {\n    font-size: 18px; color: var(--ink-2); max-width: 620px;\n    line-height: 1.55; margin: 0 0 56px;\n  }\n\n  /* How it works */\n  .how-grid {\n    display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;\n    counter-reset: step;\n  }\n  .how-step {\n    background: var(--paper);\n    border: 1px solid var(--line);\n    border-radius: var(--r-lg);\n    padding: 28px 24px;\n    position: relative;\n    min-height: 240px;\n    display: flex; flex-direction: column;\n  }\n  .how-step::before {\n    counter-increment: step;\n    content: counter(step, decimal-leading-zero);\n    font-family: var(--font-mono);\n    font-size: 12px; font-weight: 500;\n    color: var(--amber-deep);\n    letter-spacing: 0.05em;\n  }\n  .how-step h3 {\n    font-family: var(--font-display); font-size: 22px;\n    margin: 14px 0 10px; letter-spacing: -0.01em;\n    font-weight: 600;\n  }\n  .how-step p { font-size: 14px; line-height: 1.55; color: var(--ink-2); margin: 0; }\n  .how-step .icon-area {\n    margin-top: auto; padding-top: 24px;\n    height: 60px;\n    display: flex; align-items: center;\n  }\n\n  /* Two-up: For drivers / for advertisers */\n  .two-up {\n    display: grid; grid-template-columns: 1fr 1fr; gap: 24px;\n  }\n  .audience-card {\n    border-radius: var(--r-xl);\n    padding: 40px;\n    min-height: 480px;\n    display: flex; flex-direction: column;\n    position: relative; overflow: hidden;\n  }\n  .audience-card.drivers {\n    background: var(--ink);\n    color: var(--paper);\n  }\n  .audience-card.drivers .tag-pill { background: oklch(0.32 0.04 250); color: var(--amber); }\n  .audience-card.advertisers {\n    background: var(--amber);\n    color: var(--ink);\n  }\n  .audience-card.advertisers .tag-pill { background: oklch(0.18 0.025 250); color: var(--amber); }\n  .tag-pill {\n    display: inline-flex;\n    font-family: var(--font-mono); font-size: 11px;\n    text-transform: uppercase; letter-spacing: 0.08em;\n    padding: 6px 12px; border-radius: var(--r-pill);\n    width: fit-content; font-weight: 500;\n  }\n  .audience-card h3 {\n    font-family: var(--font-display);\n    font-size: 36px; letter-spacing: -0.02em;\n    margin: 18px 0 14px; line-height: 1.05; font-weight: 600;\n  }\n  .audience-card .audience-sub { font-size: 16px; line-height: 1.5; opacity: 0.85; margin-bottom: 24px; }\n  .audience-card ul {\n    list-style: none; padding: 0; margin: 0 0 32px;\n    display: flex; flex-direction: column; gap: 14px;\n  }\n  .audience-card li {\n    display: flex; gap: 12px; align-items: flex-start;\n    font-size: 15px; line-height: 1.45;\n  }\n  .audience-card li .check {\n    flex-shrink: 0; width: 20px; height: 20px;\n    border-radius: 50%;\n    display: flex; align-items: center; justify-content: center;\n    font-size: 12px; font-weight: 600;\n    margin-top: 2px;\n  }\n  .drivers .check { background: var(--amber); color: var(--ink); }\n  .advertisers .check { background: var(--ink); color: var(--amber); }\n  .audience-cta {\n    margin-top: auto;\n    display: flex; gap: 12px; align-items: center;\n  }\n  .drivers .audience-cta .btn-amber:hover { box-shadow: 0 8px 24px oklch(0.78 0.18 65 / 0.5); }\n  .advertisers .audience-cta .btn-primary { background: var(--ink); color: var(--amber); }\n\n  /* Pricing */\n  .pricing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 1000px; margin: 0 auto; }\n  .price-card {\n    background: var(--paper);\n    border: 1.5px solid var(--line);\n    border-radius: var(--r-xl);\n    padding: 36px;\n    position: relative;\n  }\n  .price-card.featured {\n    border-color: var(--amber);\n    background: linear-gradient(180deg, var(--paper) 0%, oklch(0.985 0.02 75) 100%);\n  }\n  .price-card .badge {\n    position: absolute; top: -12px; right: 24px;\n    background: var(--amber); color: var(--ink);\n    font-family: var(--font-mono); font-size: 11px;\n    padding: 4px 12px; border-radius: var(--r-pill);\n    font-weight: 600; letter-spacing: 0.05em;\n  }\n  .price-card .pname {\n    font-family: var(--font-display); font-size: 14px;\n    font-weight: 600; letter-spacing: 0.12em;\n    text-transform: uppercase; color: var(--amber-deep);\n  }\n  .price-card .ptag { font-size: 14px; color: var(--ink-3); margin-top: 6px; }\n  .price-card .price {\n    font-family: var(--font-display);\n    font-size: 56px; font-weight: 600;\n    letter-spacing: -0.03em;\n    margin: 24px 0 4px;\n    color: var(--ink);\n    display: flex; align-items: baseline; gap: 6px;\n  }\n  .price-card .price .cur { font-size: 24px; color: var(--ink-3); font-weight: 500; }\n  .price-card .price .unit {\n    font-size: 14px; color: var(--ink-3);\n    font-family: var(--font-mono); font-weight: 400;\n    margin-left: 2px;\n  }\n  .price-card ul {\n    list-style: none; padding: 0; margin: 28px 0;\n    display: flex; flex-direction: column; gap: 12px;\n  }\n  .price-card li {\n    font-size: 14px; line-height: 1.5; color: var(--ink-2);\n    display: flex; gap: 10px; align-items: flex-start;\n  }\n  .price-card li::before {\n    content: '→'; color: var(--amber-deep); flex-shrink: 0;\n    font-weight: 600; margin-top: 1px;\n  }\n  .price-card .btn { width: 100%; margin-top: 8px; }\n\n  /* Calculator (lead magnet) */\n  .calc-section {\n    background: var(--ink);\n    color: var(--paper);\n    border-radius: var(--r-xl);\n    padding: 64px;\n    display: grid; grid-template-columns: 0.9fr 1.1fr; gap: 56px;\n    align-items: center;\n    margin: 0 32px;\n    position: relative; overflow: hidden;\n  }\n  .calc-section::before {\n    content: ''; position: absolute;\n    width: 400px; height: 400px;\n    background: radial-gradient(circle, oklch(0.78 0.18 65 / 0.25) 0%, transparent 70%);\n    top: -150px; right: -100px;\n    pointer-events
