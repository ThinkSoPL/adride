name: ⏰ Hourly Production Monitor

on:
  schedule:
    # Every hour at :00
    - cron: '0 * * * *'
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    name: AdRide Monitor

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./notte-tests
        run: npm install

      - name: Run production monitor
        working-directory: ./notte-tests
        run: npm run monitor
        env:
          ADRIDE_BASE_URL: https://adride.pl
          # Add Slack webhook when ready:
          # SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '🚨 AdRide Monitor FAILED - App might be down!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        # Uncomment when you add SLACK_WEBHOOK_URL secret
